<script>
let mode = 'url';

function setMode(m){
    mode = m;

    document.getElementById('urlBox').style.display =
        m === 'url' ? 'block' : 'none';

    document.getElementById('msgBox').style.display =
        m === 'msg' ? 'block' : 'none';
}

function scan(){

    let score = 0;
    let reasons = [];

    if(mode === 'url'){

        const url =
            document.getElementById('urlInput')
            .value
            .toLowerCase()
            .trim();

        try{
            new URL(url);
        }
        catch{
            score += 25;
            reasons.push("Invalid URL format");
        }

        if(url.startsWith('http://')){
            score += 15;
            reasons.push("Uses HTTP instead of HTTPS");
        }

        if((url.match(/\./g) || []).length > 3){
            score += 10;
            reasons.push("Many subdomains detected");
        }

        const suspiciousWords = [
            "login",
            "signin",
            "verify",
            "verification",
            "security",
            "secure",
            "account",
            "bank",
            "wallet",
            "paypal",
            "microsoft",
            "google",
            "amazon",
            "update",
            "billing",
            "support",
            "confirm"
        ];

        let wordCount = 0;

        suspiciousWords.forEach(word => {
            if(url.includes(word)){
                wordCount++;
            }
        });

        if(wordCount > 0){
            score += wordCount * 8;
            reasons.push(
                `${wordCount} suspicious keyword(s) detected`
            );
        }

        if(/\.zip|\.xyz|\.top|\.click|\.icu/.test(url)){
            score += 15;
            reasons.push("Suspicious TLD detected");
        }

        if(url.split("-").length > 3){
            score += 10;
            reasons.push("Multiple hyphens detected");
        }

        const brands = [
            "paypal",
            "google",
            "microsoft",
            "amazon",
            "facebook",
            "instagram",
            "apple"
        ];

        brands.forEach(brand => {
            if(url.includes(brand)){
                score += 15;
                reasons.push(
                    `Possible ${brand} impersonation`
                );
            }
        });

        if(url.length > 35){
            score += 10;
            reasons.push("Unusually long URL");
        }

        if(reasons.length === 0){
            reasons.push("No major red flags found");
        }

    }else{

        const msg =
            document.getElementById('msgInput')
            .value
            .toLowerCase();

        const words = [
            'urgent',
            'verify now',
            'account suspended',
            'click here',
            'password',
            'otp',
            'bank',
            'security alert',
            'verify account',
            'login immediately'
        ];

        words.forEach(w => {
            if(msg.includes(w)){
                score += 12;
                reasons.push(`Detected: ${w}`);
            }
        });

        if((msg.match(/!/g) || []).length > 3){
            score += 8;
            reasons.push(
                "Excessive urgency punctuation"
            );
        }

        if(/https?:\/\//.test(msg)){
            score += 10;
            reasons.push(
                "Contains clickable links"
            );
        }

        if(reasons.length === 0){
            reasons.push(
                "No major phishing indicators found"
            );
        }
    }

    score = Math.min(score, 100);

    let level = "Low Risk";

    if(score >= 75){
        level = "High Risk";
    }
    else if(score >= 40){
        level = "Medium Risk";
    }

    document.getElementById('risk').innerText =
        `Risk Score: ${score}/100 (${level})`;

    const fill =
        document.getElementById('fill');

    fill.style.width = score + "%";

    if(score >= 75){
        fill.style.background =
            "linear-gradient(90deg,#ff3b3b,#ff8a00)";
    }
    else if(score >= 40){
        fill.style.background =
            "linear-gradient(90deg,#ffd000,#ff8a00)";
    }
    else{
        fill.style.background =
            "linear-gradient(90deg,#00cfff,#0077ff)";
    }

    const ul =
        document.getElementById('reasons');

    ul.innerHTML = '';

    reasons.forEach(r => {
        const li =
            document.createElement('li');

        li.textContent = r;

        ul.appendChild(li);
    });
}
</script>
